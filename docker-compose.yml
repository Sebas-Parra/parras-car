services:
  users-db:
    image: postgres:16-alpine
    container_name: parras-users-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - '5433:5432'
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d auth_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parras_network

  vehicles-db:
    image: postgres:16-alpine
    container_name: parras-vehicles-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vehicles_db
    ports:
      - '5434:5432'
    volumes:
      - vehicles_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d vehicles_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parras_network

  zones-db:
    image: postgres:16-alpine
    container_name: parras-zones-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zonas_db
    ports:
      - '5436:5432'
    volumes:
      - zones_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d zonas_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parras_network

  assignments-db:
    image: postgres:16-alpine
    container_name: parras-assignments-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assignments_db
    ports:
      - '5435:5432'
    volumes:
      - assignments_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d assignments_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parras_network

  tickets-db:
    image: postgres:16-alpine
    container_name: parras-tickets-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tickets_db
    ports:
      - '5437:5432'
    volumes:
      - tickets_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tickets_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parras_network

  # ─── Microservices ────────────────────────────────────────────

  users:
    build:
      context: ./users
      dockerfile: Dockerfile
    container_name: parras-users
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@users-db:5432/auth_db
    ports:
      - '8000:8000'
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - parras_network
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  vehicles:
    build:
      context: ./vehicles
      dockerfile: Dockerfile
    container_name: parras-vehicles
    restart: unless-stopped
    environment:
      DB_HOST: vehicles-db
      DB_PORT: 5432
      DB_USUARIO: postgres
      DB_CONTRASENA: postgres
      DB_NOMBRE: vehicles_db
      PORT: 3000
      JWT_SECRET: 6f2f368a76edefcc1859716acadb5cd68ac14bd4186334c03ba341da97dff77c
    ports:
      - '3000:3000'
    depends_on:
      vehicles-db:
        condition: service_healthy
    networks:
      - parras_network

  zones:
    build:
      context: ./zones
      dockerfile: Dockerfile
    container_name: parras-zones
    restart: unless-stopped
    environment:
      DB_HOST: zones-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: zonas_db
      SERVER_PORT: 8080
      JWT_SECRET: 6f2f368a76edefcc1859716acadb5cd68ac14bd4186334c03ba341da97dff77c
    ports:
      - '8080:8080'
    depends_on:
      zones-db:
        condition: service_healthy
    networks:
      - parras_network

  assignments:
    build:
      context: ./assignments
      dockerfile: Dockerfile
    container_name: parras-assignments
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@assignments-db:5432/assignments_db
      VEHICLES_SERVICE_URL: http://vehicles:3000
      USERS_SERVICE_URL: http://users:8000
    ports:
      - '8001:8001'
    depends_on:
      assignments-db:
        condition: service_healthy
      users:
        condition: service_started
      vehicles:
        condition: service_started
    networks:
      - parras_network
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8001"

  tickets:
    build:
      context: ./tickets
      dockerfile: Dockerfile
    container_name: parras-tickets
    restart: unless-stopped
    environment:
      DB_HOST: tickets-db
      DB_PORT: 5432
      DB_USUARIO: postgres
      DB_CONTRASENA: postgres
      DB_NOMBRE: tickets_db
      PORT: 3000
      JWT_SECRET: 6f2f368a76edefcc1859716acadb5cd68ac14bd4186334c03ba341da97dff77c
      ZONES_SERVICE_URL: http://zones:8080
      VEHICLES_SERVICE_URL: http://vehicles:3000
      ASSIGNMENTS_SERVICE_URL: http://assignments:8001
      TICKET_PRICE: 1.00
    ports:
      - '3001:3000'
    depends_on:
      tickets-db:
        condition: service_healthy
      zones:
        condition: service_started
      vehicles:
        condition: service_started
      assignments:
        condition: service_started
    networks:
      - parras_network

  # ─── API Gateway ──────────────────────────────────────────────

  kong:
    image: kong:3.9
    container_name: parras-gateway
    restart: unless-stopped
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: '0.0.0.0:8001'
    ports:
      - '9000:8000'
      - '9001:8001'
    volumes:
      - ./gateway:/kong/declarative
    depends_on:
      - users
      - vehicles
      - zones
      - assignments
      - tickets
    networks:
      - parras_network

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: parras-swagger-ui
    restart: unless-stopped
    environment:
      BASE_URL: /docs
      URLS: >-
        [{"url":"/users/openapi.json","name":"Users"},{"url":"/vehicles/api-json","name":"Vehicles"},{"url":"/zones/v3/api-docs","name":"Zones"},{"url":"/assignments/openapi.json","name":"Assignments"},{"url":"/tickets/api-json","name":"Tickets"}]
    depends_on:
      - kong
    networks:
      - parras_network

volumes:
  users_db_data:
  vehicles_db_data:
  zones_db_data:
  assignments_db_data:
  tickets_db_data:

networks:
  parras_network:
    driver: bridge
